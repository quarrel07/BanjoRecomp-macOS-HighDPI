# Builds the macOS app on a GitHub-hosted Apple Silicon runner and uploads the .app as an artifact.
#
# IMPORTANT — the ROM is never stored in this repository. Like the upstream project's CI, this
# workflow pulls your own ROM from a PRIVATE repo you control, via two repository secrets:
#   • SECRET_NAME   = "your-github-username/your-private-rom-repo"
#   • SECRET_TOKEN  = a Personal Access Token (repo scope) that can read that private repo
# That private repo should contain your legally-obtained ROM, named as expected by
# banjo.us.rev0.toml. If the secrets are not set, the workflow skips the build and explains how.
#
# Run it from the Actions tab → "macOS build" → "Run workflow".

name: macOS build

on:
  workflow_dispatch:        # manual trigger
  push:
    branches: [ main, macos-highdpi ]

jobs:
  build-macos:
    name: Build macOS app (Apple Silicon)
    runs-on: macos-14       # Apple Silicon; ships with Xcode (needed for actool / the icon)
    steps:
      - name: Checkout (recursive — pulls the fixed rt64/plume/RecompFrontend forks)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check ROM source is configured
        id: rom
        env:
          SECRET_NAME: ${{ secrets.SECRET_NAME }}
        run: |
          if [ -z "$SECRET_NAME" ]; then
            echo "::warning::No ROM source configured — skipping build."
            echo "::warning::Set repo secrets SECRET_NAME (your-user/your-private-rom-repo) and"
            echo "::warning::SECRET_TOKEN (a PAT that can read it). The ROM is never stored in this repo."
            echo "have_rom=false" >> "$GITHUB_OUTPUT"
          else
            echo "have_rom=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch ROM from your private repo
        if: steps.rom.outputs.have_rom == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.SECRET_NAME }}
          token: ${{ secrets.SECRET_TOKEN }}
          path: extra

      - name: Install dependencies (Homebrew)
        if: steps.rom.outputs.have_rom == 'true'
        run: brew install ninja sdl2

      - name: Build N64Recomp & RSPRecomp (your fork, with the teq fix)
        if: steps.rom.outputs.have_rom == 'true'
        run: |
          git clone https://github.com/quarrel07/N64Recomp.git --branch macos-highdpi --recurse-submodules N64RecompSource
          cmake -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_C_COMPILER=clang \
            -S N64RecompSource -B N64RecompSource/cmake-build
          cmake --build N64RecompSource/cmake-build --config Release --target N64RecompCLI -j $(sysctl -n hw.ncpu)
          cmake --build N64RecompSource/cmake-build --config Release --target RSPRecomp   -j $(sysctl -n hw.ncpu)
          cp N64RecompSource/cmake-build/N64Recomp .
          cp N64RecompSource/cmake-build/RSPRecomp .
          # file_to_c is also needed by the main build; copy it if N64Recomp produced one.
          find N64RecompSource/cmake-build -maxdepth 2 -name file_to_c -exec cp {} . \; || true

      - name: Run the recompiler
        if: steps.rom.outputs.have_rom == 'true'
        run: |
          cp extra/* .                 # your ROM (the .toml configs are already in this repo)
          ./N64Recomp banjo.us.rev0.toml
          ./RSPRecomp n_aspMain.us.rev0.toml

      - name: Build the macOS app
        if: steps.rom.outputs.have_rom == 'true'
        run: |
          cmake -S . -B build-cmake -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_C_COMPILER=clang
          cmake --build build-cmake --target BanjoRecompiled -j $(sysctl -n hw.ncpu) --config Release

      - name: Package & upload the .app
        if: steps.rom.outputs.have_rom == 'true'
        run: tar -C build-cmake -czf BanjoRecompiled-macOS-arm64.tar.gz BanjoRecompiled.app

      - name: Upload artifact
        if: steps.rom.outputs.have_rom == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: BanjoRecompiled-macOS-arm64
          path: BanjoRecompiled-macOS-arm64.tar.gz
